{% extends "base.html" %}
{% block title %}登入{% endblock %}
{% block content %}
<article class="grid" style="max-width: 420px; margin: 5rem auto;">
    <div>
        <hgroup>
            <h2>{{ brand_name }}</h2>
            <p>代理後台登入</p>
        </hgroup>
        {% if error %}
        <p style="color: var(--pico-del-color);">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <label>
                推廣碼
                <input type="text" name="code" placeholder="REF-XXXX 或自訂碼" required autofocus>
            </label>
            <label>
                密碼
                <input type="password" name="password" placeholder="請輸入密碼" required>
            </label>
            <button type="submit">登入</button>
        </form>
    </div>
</article>
{% endblock %}
